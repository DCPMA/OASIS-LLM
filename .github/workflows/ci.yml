name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --frozen

      - name: Run pytest
        run: uv run --with pytest pytest -q

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    # Ruff is advisory-only until the codebase is fully ruff-clean.
    # Flip continue-on-error to false to make it blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Ruff check
        run: uv run --with 'ruff>=0.6' ruff check src tests

      - name: Ruff format check
        run: uv run --with 'ruff>=0.6' ruff format --check src tests

  docs-json:
    name: Validate Mintlify docs.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check docs.json references existing pages
        run: |
          python - <<'PY'
          import json, pathlib, sys

          docs = pathlib.Path("site/docs")
          cfg = json.loads((docs / "docs.json").read_text())
          missing = []
          for tab in cfg.get("navigation", {}).get("tabs", []):
              for group in tab.get("groups", []):
                  for page in group.get("pages", []):
                      mdx = docs / f"{page}.mdx"
                      if not mdx.exists():
                          missing.append(str(mdx))
          if missing:
              print("Missing pages referenced from docs.json:")
              for m in missing:
                  print(f"  {m}")
              sys.exit(1)
          print("docs.json: all referenced pages exist")
          PY
