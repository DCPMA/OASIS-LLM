# Pilot run: 30 stratified images x 5 samples per image, both dimensions.
# Cost-conscious OpenRouter vision models.
name: pilot-gemma4-31b
provider: openrouter
model: google/gemma-4-31b-it
modality: vision
dimensions: [valence, arousal]
image_set: pilot_30
samples_per_image: 5
max_concurrency: 4
request_timeout_s: 60
max_tokens: 256
capture_reasoning: true
